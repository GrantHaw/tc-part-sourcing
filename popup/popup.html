<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <img src="../icons/icon48.png" alt="">
    <h1>TC Part Sourcing</h1>
    <button id="popout" class="header-btn" title="Open in detached window">Pop out ↗</button>
  </header>

  <div class="status" id="status"></div>

  <section class="form">
    <div class="row">
      <label>URL</label>
      <input type="url" id="url">
    </div>

    <div class="row">
      <label>Part number</label>
      <input id="partNum" placeholder="leave blank for N/A">
    </div>

    <div class="two">
      <div class="row">
        <label>Price</label>
        <input id="price" placeholder="$XX.XX">
      </div>
      <div class="row">
        <label>Shipping</label>
        <input id="shipping" placeholder="Free or $X.XX">
      </div>
    </div>

    <div class="row">
      <label>Ships from</label>
      <input id="location" placeholder="City, ST">
    </div>

    <div class="row">
      <label>Delivery time</label>
      <input id="delivery" placeholder="e.g. 3-5 days">
    </div>

    <div class="two">
      <div class="row">
        <label>Rating</label>
        <input id="rating" placeholder="99.2% positive / 4.5/5 stars">
      </div>
      <div class="row">
        <label>Reviews</label>
        <input id="reviews" placeholder="4521">
      </div>
    </div>

    <div class="row">
      <label>Return policy</label>
      <input id="returns" placeholder="30-day returns">
    </div>

    <div class="row">
      <label>Notes</label>
      <textarea id="notes" rows="2" placeholder="optional"></textarea>
    </div>

    <div class="actions">
      <button id="rescrape" class="secondary">Re-scrape</button>
      <button id="add" class="primary">Add to list</button>
    </div>
  </section>

  <section class="options">
    <h2>Options <span class="count" id="count">(0)</span></h2>
    <ol id="list"></ol>
  </section>

  <footer>
    <button id="copy" class="primary">Copy all</button>
    <button id="clear" class="danger">Clear list</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
